apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: danielshmatnik/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        env:
        - name: MYSQL_HOST
          value: "mysqldb"
        - name: MYSQL_PASSWORD
          value: "123456"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
